<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тестирование | Ученик</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 32px;
            padding: 30px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.2);
        }

        h1 {
            color: #1f2b48;
            margin-bottom: 20px;
            text-align: center;
        }

        .student-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 20px;
        }

        .student-info label {
            color: white;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cfdfed;
            border-radius: 20px;
            margin-bottom: 15px;
        }

        button {
            background: #2c7a4d;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }

        button:hover {
            background: #1e5a38;
        }

        .quiz-question {
            background: #f8fafd;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .quiz-question p {
            font-weight: 600;
            margin-bottom: 12px;
        }

        .quiz-answer {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
            cursor: pointer;
        }

        .result-area {
            margin-top: 20px;
            background: #eef3fc;
            border-radius: 24px;
            padding: 20px;
            text-align: center;
        }

        .score {
            font-size: 2rem;
            font-weight: 800;
            color: #2c7a4d;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h1>📝 Прохождение теста</h1>
        
        <div class="student-info">
            <h3 style="color:white; margin-bottom:15px;">Введите ваши данные</h3>
            <input type="text" id="surname" placeholder="Фамилия">
            <input type="text" id="name" placeholder="Имя">
            <input type="text" id="patronymic" placeholder="Отчество">
        </div>
        
        <div id="quizArea"></div>
        
        <button id="submitBtn">✅ Завершить тест</button>
        
        <div id="resultArea" style="display: none;"></div>
    </div>
</div>

<script>
    let questionsBank = [];
    
    function loadQuestions() {
        const saved = localStorage.getItem('quizQuestions');
        if (saved) {
            try {
                questionsBank = JSON.parse(saved);
            } catch(e) { questionsBank = []; }
        }
        if (questionsBank.length === 0) {
            document.getElementById('quizArea').innerHTML = '<div style="text-align:center;padding:40px;">📭 Тест пока пуст. Обратитесь к учителю.</div>';
            document.getElementById('submitBtn').style.display = 'none';
        } else {
            renderQuiz();
        }
    }
    
    function renderQuiz() {
        let html = '';
        questionsBank.forEach((q, idx) => {
            html += `
                <div class="quiz-question">
                    <p>${idx+1}. ${escapeHtml(q.text)}</p>
            `;
            q.answers.forEach((ans, aidx) => {
                html += `
                    <label class="quiz-answer">
                        <input type="radio" name="q${idx}" value="${aidx}">
                        <span>${escapeHtml(ans.text)}</span>
                    </label>
                `;
            });
            html += `</div>`;
        });
        document.getElementById('quizArea').innerHTML = html;
    }
    
    function saveResult() {
        const surname = document.getElementById('surname').value.trim();
        const name = document.getElementById('name').value.trim();
        const patronymic = document.getElementById('patronymic').value.trim();
        
        if (!surname || !name) {
            alert('Пожалуйста, введите фамилию и имя!');
            return;
        }
        
        let correct = 0;
        const userAnswers = [];
        
        for (let i = 0; i < questionsBank.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            const answerIdx = selected ? parseInt(selected.value) : -1;
            userAnswers.push(answerIdx);
            if (answerIdx !== -1 && questionsBank[i].answers[answerIdx]?.isCorrect) {
                correct++;
            }
        }
        
        const total = questionsBank.length;
        const percent = Math.round((correct / total) * 100);
        
        const result = {
            id: Date.now(),
            date: new Date().toLocaleString('ru-RU'),
            surname, name, patronymic,
            fullName: `${surname} ${name} ${patronymic}`.trim(),
            correct, total, percent
        };
        
        let allResults = JSON.parse(localStorage.getItem('testResults') || '[]');
        allResults.unshift(result);
        localStorage.setItem('testResults', JSON.stringify(allResults));
        
        document.getElementById('resultArea').style.display = 'block';
        document.getElementById('resultArea').innerHTML = `
            <div class="result-area">
                <div class="score">${correct} / ${total}</div>
                <div style="font-size:1.3rem;">${percent}% правильных ответов</div>
                <div style="margin-top:10px;">✅ Результат сохранён!</div>
                <button onclick="location.reload()" style="background:#2c3e66; margin-top:15px;">🔄 Пройти ещё раз</button>
            </div>
        `;
        document.getElementById('submitBtn').style.display = 'none';
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
    }
    
    loadQuestions();
    document.getElementById('submitBtn').onclick = saveResult;
</script>
</body>
</html>
